<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var basePath = "/greatfortheplanet";
        var fullPath = window.location.pathname + window.location.search + window.location.hash;
        var appRoute = window.location.pathname.replace(basePath, "").toLowerCase();
        var validRoutes = ["/", "/business", "/individuals", "/projects", "/purchase", "/aboutus", "/login", "/sign-up"];

        if (fullPath.indexOf(basePath + "/") === 0 && validRoutes.indexOf(appRoute) !== -1) {
          sessionStorage.setItem("redirectPath", fullPath);
        }

        window.location.replace(basePath + "/");
      })();
    </script>
  </head>
  <body></body>
</html>
